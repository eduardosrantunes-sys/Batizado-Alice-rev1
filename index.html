<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Plano de Mesas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e2d9;
  --text: #1a1714;
  --text-muted: #8c7f72;
  --accent: #b5845a;
  --accent-light: #f5ede4;
  --green: #4a7c59;
  --green-light: #e8f0eb;
  --amber: #a0692a;
  --amber-light: #f5eddf;
  --blue: #2d5986;
  --blue-light: #e5edf5;
  --danger: #c0392b;
  --danger-light: #fbeaea;
  --success: #2e7d52;
  --success-light: #e6f4ec;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* HEADER */
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px 12px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
.header-title { font-family: 'Playfair Display', serif; font-size: 19px; color: var(--text); flex-shrink: 0; }
.header-title span { color: var(--accent); }
.search-box { flex: 1; max-width: 200px; position: relative; }
.search-box input { width: 100%; padding: 7px 10px 7px 30px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; }
.search-box input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
.search-result { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow); z-index: 200; display: none; max-height: 200px; overflow-y: auto; }
.search-result.show { display: block; }
.search-item { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
.search-item:last-child { border-bottom: none; }
.search-item strong { color: var(--accent); }

.stats-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.stat { background: var(--bg); border-radius: var(--radius-sm); padding: 7px 4px; text-align: center; }
.stat-n { font-size: 17px; font-weight: 500; color: var(--text); line-height: 1; }
.stat-l { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.stat.warn .stat-n { color: var(--danger); }

/* TABS */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 109px; z-index: 99; overflow-x: auto; }
.tab { flex: 1; padding: 11px 6px; text-align: center; font-size: 12px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; min-width: 60px; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* CONTENT */
.content { padding: 14px; padding-bottom: 90px; }

/* BANNER */
.banner { background: var(--amber-light); border: 1px solid #e8d4b0; border-radius: var(--radius-sm); padding: 9px 12px; margin-bottom: 12px; font-size: 12px; color: var(--amber); display: none; }
.banner.show { display: block; }

/* MESA CARD */
.mesa-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow); }
.mesa-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--border); background: var(--bg); }
.mesa-num { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: white; font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: grab; }
.mesa-num:active { cursor: grabbing; }
.mesa-name { flex: 1; font-size: 13px; font-weight: 500; border: none; background: transparent; color: var(--text); outline: none; min-width: 0; }
.mesa-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.mesa-count { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.mesa-badges { display: flex; gap: 3px; }
.mbadge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; display: flex; flex-direction: column; align-items: center; line-height: 1.2; }
.mbadge-a { background: var(--blue-light); color: var(--blue); }
.mbadge-c { background: var(--green-light); color: var(--green); }
.mbadge-b { background: var(--amber-light); color: var(--amber); }
.mbadge-num { font-size: 15px; font-weight: 500; line-height: 1; }
.mbadge-lbl { font-size: 9px; opacity: 0.75; margin-top: 1px; }
.mesa-actions { display: flex; gap: 4px; }
.mesa-btn { width: 26px; height: 26px; border-radius: 50%; border: none; background: none; color: var(--text-muted); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.mesa-btn:active { background: var(--border); }
.mesa-btn.danger:active { background: var(--danger-light); color: var(--danger); }
.mesa-body { padding: 8px 10px; }
.guest-chips { display: flex; flex-wrap: wrap; gap: 5px; min-height: 32px; }
.empty-mesa { font-size: 11px; color: var(--text-muted); font-style: italic; padding: 4px 0; }

/* CHIPS */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 9px; border-radius: 20px; font-size: 11px; cursor: pointer; user-select: none; border: none; outline: none; transition: transform 0.1s; }
.chip:active { transform: scale(0.95); }
.chip-a { background: var(--blue-light); color: var(--blue); }
.chip-c { background: var(--green-light); color: var(--green); }
.chip-b { background: var(--amber-light); color: var(--amber); }
.chip-x { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; background: rgba(0,0,0,0.1); font-size: 9px; flex-shrink: 0; }

/* UNASSIGNED */
.unassigned-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: var(--radius-sm); margin-bottom: 5px; font-size: 13px; border: 1px solid transparent; }
.unassigned-item.ui-a { background: var(--blue-light); color: var(--blue); border-color: #c5d8ee; }
.unassigned-item.ui-c { background: var(--green-light); color: var(--green); border-color: #c0d9c9; }
.unassigned-item.ui-b { background: var(--amber-light); color: var(--amber); border-color: #e8d4b0; }
.ui-right { display: flex; align-items: center; gap: 6px; }
.cat-tag { font-size: 10px; opacity: 0.65; }
.assign-btn { background: white; border: 1px solid currentColor; border-radius: 20px; padding: 3px 9px; font-size: 11px; font-weight: 500; color: inherit; cursor: pointer; }
.edit-guest-btn { background: none; border: none; cursor: pointer; font-size: 14px; opacity: 0.5; color: inherit; padding: 2px; }
.edit-guest-btn:active { opacity: 1; }

/* FORMS */
.form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
.form-card h3 { font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px; }
.form-row { display: flex; gap: 7px; flex-wrap: wrap; }
.form-row input, .form-row select { flex: 1; min-width: 100px; padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; }
.form-row input:focus, .form-row select:focus { border-color: var(--accent); }
.btn-add { padding: 9px 14px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; white-space: nowrap; }
.btn-add:active { opacity: 0.85; }
.form-hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
.form-error { font-size: 12px; color: var(--danger); margin-top: 5px; display: none; }

/* LEGEND */
.legend { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; }

/* MAP VIEW */
.map-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.map-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; box-shadow: var(--shadow); }
.map-card-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
.map-counts { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
.map-names { font-size: 10px; color: var(--text-muted); line-height: 1.6; }

/* READ MODE */
.read-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
.read-card-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--accent); margin-bottom: 10px; }
.read-list { list-style: none; }
.read-list li { padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.read-list li:last-child { border-bottom: none; }

/* BOTTOM BAR */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 10px 14px; display: flex; gap: 8px; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); }
.btn-save { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 11px 13px; background: var(--bg); color: var(--accent); border: 1.5px solid var(--accent); border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; font-family: inherit; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.btn-save.saved { background: var(--accent); color: white; }
.btn-save:active { opacity: 0.85; }
.btn-wa { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 11px; background: #25D366; color: white; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; }
.btn-wa:active { opacity: 0.85; }
.btn-txt { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 11px 12px; background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; font-family: inherit; cursor: pointer; white-space: nowrap; }
.btn-txt:active { background: var(--border); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 480px; max-height: 85vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 500; }
.modal-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.modal-close { width: 30px; height: 30px; border: none; background: var(--bg); border-radius: 50%; font-size: 18px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
.modal-body { overflow-y: auto; padding: 12px 14px; flex: 1; }
.modal-mesa-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 11px 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); font-family: inherit; font-size: 13px; color: var(--text); cursor: pointer; margin-bottom: 6px; text-align: left; }
.modal-mesa-btn:active { background: var(--accent-light); border-color: var(--accent); }
.modal-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; margin-bottom: 8px; }
.modal-input:focus { border-color: var(--accent); }
.modal-select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; margin-bottom: 8px; }
.modal-btn { width: 100%; padding: 11px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; margin-top: 4px; }
.modal-btn:active { opacity: 0.85; }
.modal-btn.danger { background: var(--danger); }
.modal-section { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin: 14px 0 8px; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 36px 20px; color: var(--text-muted); }
.empty-state .emoji { font-size: 36px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; }

/* UNDO TOAST */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: white; padding: 10px 16px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 10px; opacity: 0; pointer-events: none; transition: all 0.2s; z-index: 300; white-space: nowrap; }
.toast.show { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
.toast-undo { background: none; border: none; color: var(--accent); font-size: 13px; font-weight: 500; cursor: pointer; padding: 0; font-family: inherit; }

/* DRAG OVER */
.mesa-card.drag-over { border-color: var(--accent); background: var(--accent-light); }
.drag-handle { cursor: grab; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-title">Plano de <span>Mesas</span></div>
    <div class="search-box">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Procurar..." oninput="doSearch(this.value)" onblur="setTimeout(()=>hideSearch(),200)">
      <div class="search-result" id="search-result"></div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">confirmados</div></div>
    <div class="stat"><div class="stat-n" id="s-sentados">0</div><div class="stat-l">sentados</div></div>
    <div class="stat"><div class="stat-n" id="s-mesas">0</div><div class="stat-l">mesas</div></div>
    <div class="stat warn"><div class="stat-n" id="s-livres">0</div><div class="stat-l">por sentar</div></div>
    <div class="stat" style="background:var(--blue-light)"><div class="stat-n" id="s-adultos" style="color:var(--blue)">0</div><div class="stat-l" style="color:var(--blue)">adultos</div></div>
    <div class="stat" style="background:var(--green-light)"><div class="stat-n" id="s-criancas" style="color:var(--green)">0</div><div class="stat-l" style="color:var(--green)">crianças</div></div>
    <div class="stat" style="background:var(--amber-light)"><div class="stat-n" id="s-bebes" style="color:var(--amber)">0</div><div class="stat-l" style="color:var(--amber)">bebés</div></div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('mesas',this)">Mesas</div>
  <div class="tab" onclick="switchTab('por-sentar',this)">Por Sentar</div>
  <div class="tab" onclick="switchTab('mapa',this)">Mapa</div>
  <div class="tab" onclick="switchTab('leitura',this)">Leitura</div>
  <div class="tab" onclick="switchTab('novo',this)">+ Novo</div>
</div>

<div class="content">

  <!-- MESAS -->
  <div id="tab-mesas">
    <div id="banner" class="banner"></div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--blue)"></div>Adulto</div>
      <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Criança</div>
      <div class="leg"><div class="leg-dot" style="background:var(--amber)"></div>Bebé</div>
    </div>
    <div id="mesas-list"></div>
  </div>

  <!-- POR SENTAR -->
  <div id="tab-por-sentar" style="display:none">
    <div id="unassigned-list"></div>
  </div>

  <!-- MAPA -->
  <div id="tab-mapa" style="display:none">
    <div id="mapa-grid" class="map-grid"></div>
  </div>

  <!-- LEITURA -->
  <div id="tab-leitura" style="display:none">
    <div id="leitura-list"></div>
  </div>

  <!-- NOVO -->
  <div id="tab-novo" style="display:none">
    <div class="form-card">
      <h3>Nova mesa</h3>
      <div class="form-row">
        <input type="text" id="nova-nome" placeholder="Nome (ex: Mesa 10)">
        <button class="btn-add" onclick="addMesa()">Adicionar</button>
      </div>
    </div>
    <div class="form-card">
      <h3>Novo convidado</h3>
      <div class="form-row">
        <input type="text" id="novo-nome" placeholder="Nome do convidado">
        <select id="novo-cat">
          <option value="a">Adulto</option>
          <option value="c">Criança</option>
          <option value="b">Bebé</option>
        </select>
        <button class="btn-add" onclick="addGuest()">Adicionar</button>
      </div>
      <div id="novo-erro" class="form-error">Insere um nome primeiro.</div>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="btn-save" id="btn-gravar" onclick="saveState()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Gravar
  </button>
  <button class="btn-wa" onclick="shareWhatsApp()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
    WhatsApp
  </button>
  <button class="btn-txt" onclick="exportTxt()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    .txt
  </button>
</div>

<!-- MODAL GENÉRICO -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- UNDO TOAST -->
<div class="toast" id="toast">
  <span id="toast-msg"></span>
  <button class="toast-undo" onclick="undoAction()">Desfazer</button>
</div>

<script>
// ─── DADOS BASE ───────────────────────────────────────────────────────────────
const BASE_GUESTS = [
  {id:0,name:"Amélia Tróia",cat:"c"},{id:1,name:"Alice",cat:"c"},{id:2,name:"Martim",cat:"c"},
  {id:3,name:"Camila",cat:"c"},{id:4,name:"Clara",cat:"c"},{id:5,name:"Bia",cat:"c"},

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function catLabel(c) { return c==='c'?'Criança':c==='b'?'Bebé':'Adulto'; }
function chipCls(c) { return 'chip chip-'+c; }
function uiCls(c) { return 'unassigned-item ui-'+c; }
function getAssigned() { const s=new Set(); Object.values(assignments).forEach(a=>a.forEach(id=>s.add(id))); return s; }
function getMesaGuests(mid) { return (assignments[mid]||[]).map(id=>guests.find(g=>g.id===id)).filter(Boolean); }
function pushHistory(action) { history.push(action); if(history.length>30) history.shift(); }

function getMesaBadges(mid) {
  const gs = getMesaGuests(mid);
  const a = gs.filter(g=>g.cat==='a').length;
  const c = gs.filter(g=>g.cat==='c').length;
  const b = gs.filter(g=>g.cat==='b').length;
  let html = '';
  if(a) html += `<span class="mbadge mbadge-a"><span class="mbadge-num">${a}</span><span class="mbadge-lbl">adultos</span></span>`;
  if(c) html += `<span class="mbadge mbadge-c"><span class="mbadge-num">${c}</span><span class="mbadge-lbl">crianças</span></span>`;
  if(b) html += `<span class="mbadge mbadge-b"><span class="mbadge-num">${b}</span><span class="mbadge-lbl">bebés</span></span>`;
  return html;
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  const assigned = getAssigned().size;
  const total = guests.length;
  const free = total - assigned;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-sentados').textContent = assigned;
  document.getElementById('s-mesas').textContent = mesas.length;
  document.getElementById('s-livres').textContent = free;
  document.getElementById('s-adultos').textContent = guests.filter(g=>g.cat==='a').length;
  document.getElementById('s-criancas').textContent = guests.filter(g=>g.cat==='c').length;
  document.getElementById('s-bebes').textContent = guests.filter(g=>g.cat==='b').length;
  const banner = document.getElementById('banner');
  if(free > 0) {
    const names = guests.filter(g=>!getAssigned().has(g.id)).map(g=>g.name).join(', ');
    banner.textContent = '⚠ '+free+' sem mesa: '+names;
    banner.classList.add('show');
  } else { banner.classList.remove('show'); }
}

// ─── RENDER MESAS ─────────────────────────────────────────────────────────────
function renderMesas() {
  const el = document.getElementById('mesas-list');
  if(!mesas.length) { el.innerHTML = '<div class="empty-state"><div class="emoji">🪑</div><p>Sem mesas. Vai a + Novo para adicionar.</p></div>'; return; }
  el.innerHTML = mesas.map((m,i) => {
    const gs = getMesaGuests(m.id);
    const chips = gs.length
      ? gs.map(g=>`<button class="${chipCls(g.cat)}" onclick="openRemoveFromMesa(${g.id},'${m.id}')" title="Toca para opções">${g.name}<span class="chip-x">×</span></button>`).join('')
      : '<span class="empty-mesa">Sem convidados</span>';
    return `<div class="mesa-card" id="mc-${m.id}" ondragover="mesaDragOver(event,'${m.id}')" ondragleave="mesaDragLeave('${m.id}')" ondrop="mesaDrop(event,'${m.id}')">
      <div class="mesa-head">
        <div class="mesa-num" draggable="true" ondragstart="mesaOrderDrag(event,'${m.id}')" title="Arrastar para reordenar">${i+1}</div>
        <div style="flex:1;min-width:0;">
          <input class="mesa-name" value="${m.nome}" onchange="renameMesa('${m.id}',this.value)">
          <div style="display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;">
            <div class="mesa-badges">${getMesaBadges(m.id)}</div>
            <span class="mesa-count" style="font-size:10px;">${gs.length} total</span>
          </div>
        </div>
        <div class="mesa-actions">
          <button class="mesa-btn" onclick="duplicateMesa('${m.id}')" title="Duplicar">⧉</button>
          <button class="mesa-btn danger" onclick="confirmRemoveMesa('${m.id}')" title="Remover">×</button>
        </div>
      </div>
      <div class="mesa-body"><div class="guest-chips">${chips}</div></div>
    </div>`;
  }).join('');
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
const TAB_NAMES = ['mesas','por-sentar','mapa','leitura','novo'];
function switchTab(name, el) {
  TAB_NAMES.forEach(t => { document.getElementById('tab-'+t).style.display = t===name?'block':'none'; });
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', TAB_NAMES[i]===name));
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function doSearch(q) {
  const res = document.getElementById('search-result');
  if(!q.trim()) { res.classList.remove('show'); return; }
  const assigned = getAssigned();
  const matches = guests.filter(g=>g.name.toLowerCase().includes(q.toLowerCase())).slice(0,6);
  if(!matches.length) { res.innerHTML='<div class="search-item">Sem resultados</div>'; res.classList.add('show'); return; }
  res.innerHTML = matches.map(g => {
    const mid = Object.keys(assignments).find(k=>(assignments[k]||[]).includes(g.id));
    const mesa = mid ? mesas.find(m=>m.id===mid) : null;
    const where = mesa ? `<strong>${mesa.nome}</strong>` : '<em>Por sentar</em>';
    return `<div class="search-item">${g.name} — ${where}</div>`;
  }).join('');
  res.classList.add('show');
}
function hideSearch() { document.getElementById('search-result').classList.remove('show'); }

// ─── MESA ACTIONS ─────────────────────────────────────────────────────────────
function renameMesa(id, name) { const m=mesas.find(m=>m.id===id); if(m) m.nome=name; renderMapa(); renderLeitura(); }

function addMesa() {
  mesaCounter++;
  const nome = document.getElementById('nova-nome').value.trim() || `Mesa ${mesaCounter}`;
  const id = 'm'+mesaCounter;
  pushHistory({type:'addMesa', id, nome});
  mesas.push({id, nome});
  assignments[id] = [];
  document.getElementById('nova-nome').value = '';
  renderAll();
  switchTab('mesas', null);
  showToast('Mesa adicionada', true);
}

function duplicateMesa(id) {
  mesaCounter++;
  const src = mesas.find(m=>m.id===id);
  const newId = 'm'+mesaCounter;
  const newNome = src.nome+' (cópia)';
  mesas.push({id:newId, nome:newNome});
  assignments[newId] = [];
  renderAll();
  showToast('Mesa duplicada (sem convidados)', false);
}

function confirmRemoveMesa(id) {
  const m = mesas.find(m=>m.id===id);
  const gs = getMesaGuests(id);
  openModal('Remover mesa', m.nome, `
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px">${gs.length>0?gs.length+' convidado(s) voltam à lista por sentar.':'Mesa vazia.'}</p>
    <button class="modal-btn danger" onclick="removeMesa('${id}')">Remover mesa</button>
  `);
}

function removeMesa(id) {
  const m = mesas.find(m=>m.id===id);
  const saved = {mesas: JSON.parse(JSON.stringify(mesas)), assignments: JSON.parse(JSON.stringify(assignments))};
  pushHistory({type:'removeMesa', saved});
  mesas = mesas.filter(m=>m.id!==id);
  delete assignments[id];
  closeModal();
  renderAll();
  showToast('Mesa removida', true);
}

// ─── MESA REORDER (DRAG) ──────────────────────────────────────────────────────
let dragOrderId = null;
function mesaOrderDrag(e, id) { dragOrderId = id; e.dataTransfer.effectAllowed='move'; }

// ─── GUEST DRAG TO MESA ───────────────────────────────────────────────────────
function mesaDragOver(e, mesaId) { e.preventDefault(); document.getElementById('mc-'+mesaId).classList.add('drag-over'); }
function mesaDragLeave(id) { document.getElementById('mc-'+id).classList.remove('drag-over'); }
function mesaDrop(e, mesaId) {
  e.preventDefault();
  document.getElementById('mc-'+mesaId).classList.remove('drag-over');
  if(dragOrderId && dragOrderId !== mesaId) {
    const from = mesas.findIndex(m=>m.id===dragOrderId);
    const to = mesas.findIndex(m=>m.id===mesaId);
    if(from!==-1&&to!==-1) { const [el]=mesas.splice(from,1); mesas.splice(to,0,el); }
    dragOrderId = null;
    renderAll();
  }
}

// ─── GUEST ACTIONS ────────────────────────────────────────────────────────────
function addGuest() {
  const nome = document.getElementById('novo-nome').value.trim();
  const err = document.getElementById('novo-erro');
  if(!nome) { err.style.display='block'; return; }
  err.style.display='none';
  const cat = document.getElementById('novo-cat').value;
  const id = guestCounter++;
  pushHistory({type:'addGuest', id});
  guests.push({id, name:nome, cat});
  document.getElementById('novo-nome').value='';
  renderAll();
  switchTab('por-sentar', null);
  showToast('Convidado adicionado', false);
}

function openEditGuest(gid) {
  const g = guests.find(x=>x.id===gid);
  openModal('Editar convidado', g.name, `
    <input class="modal-input" id="edit-nome" value="${g.name}" placeholder="Nome">
    <select class="modal-select" id="edit-cat">
      <option value="a" ${g.cat==='a'?'selected':''}>Adulto</option>
      <option value="c" ${g.cat==='c'?'selected':''}>Criança</option>
      <option value="b" ${g.cat==='b'?'selected':''}>Bebé</option>
    </select>
    <button class="modal-btn" onclick="saveEditGuest(${gid})">Guardar</button>
    <div class="modal-section">Zona de perigo</div>
    <button class="modal-btn danger" onclick="removeGuest(${gid})" style="margin-top:4px">Remover convidado</button>
  `);
}

function saveEditGuest(gid) {
  const g = guests.find(x=>x.id===gid);
  const saved = {name:g.name, cat:g.cat};
  pushHistory({type:'editGuest', gid, saved});
  g.name = document.getElementById('edit-nome').value.trim() || g.name;
  g.cat = document.getElementById('edit-cat').value;
  closeModal();
  renderAll();
}

function removeGuest(gid) {
  const saved = {guest: JSON.parse(JSON.stringify(guests.find(g=>g.id===gid))), assignments: JSON.parse(JSON.stringify(assignments))};
  pushHistory({type:'removeGuest', saved});
  guests = guests.filter(g=>g.id!==gid);
  Object.keys(assignments).forEach(k=>{ assignments[k]=(assignments[k]||[]).filter(x=>x!==gid); });
  closeModal();
  renderAll();
  showToast('Convidado removido', true);
}

function openRemoveFromMesa(gid, mid) {
  const g = guests.find(x=>x.id===gid);
  const m = mesas.find(x=>x.id===mid);
  openModal(g.name, m.nome, `
    <button class="modal-btn" onclick="openEditGuestFromMesa(${gid},'${mid}')">✎ Editar convidado</button>
    <button class="modal-btn" style="margin-top:8px;background:var(--bg);color:var(--text);border:1px solid var(--border)" onclick="moveGuest(${gid},'${mid}')">Mudar de mesa</button>
    <div class="modal-section" style="margin-top:12px">Remover da mesa</div>
    <button class="modal-btn danger" onclick="removeFromMesa(${gid},'${mid}')" style="margin-top:4px">Remover de ${m.nome}</button>
  `);
}

function openEditGuestFromMesa(gid, mid) {
  closeModal();
  openEditGuest(gid);
}

function removeFromMesa(gid, mid) {
  pushHistory({type:'removeFromMesa', gid, mid});
  assignments[mid] = (assignments[mid]||[]).filter(x=>x!==gid);
  closeModal();
  renderAll();
  showToast('Removido da mesa', true);
}

function moveGuest(gid, fromMid) {
  closeModal();
  openAssignModal(gid, fromMid);
}

// ─── ASSIGN MODAL ─────────────────────────────────────────────────────────────
function openAssignModal(gid, fromMid) {
  const g = guests.find(x=>x.id===gid);
  const btns = mesas.map(m=>{
    const cnt = (assignments[m.id]||[]).length;
    return `<button class="modal-mesa-btn" onclick="assignGuest(${gid},'${m.id}','${fromMid||''}')">
      <span>${m.nome}</span><span style="font-size:11px;color:var(--text-muted)">${cnt} pax</span>
    </button>`;
  }).join('');
  openModal('Sentar convidado', g.name, btns || '<p style="color:var(--text-muted);font-size:13px">Sem mesas. Cria uma primeiro.</p>');
}

function assignGuest(gid, mid, fromMid) {
  pushHistory({type:'assign', gid, mid, fromMid});
  if(fromMid && assignments[fromMid]) assignments[fromMid] = assignments[fromMid].filter(x=>x!==gid);
  if(!assignments[mid]) assignments[mid]=[];
  if(!assignments[mid].includes(gid)) assignments[mid].push(gid);
  closeModal();
  renderAll();
}

// ─── UNDO ─────────────────────────────────────────────────────────────────────
function undoAction() {
  if(!history.length) return;
  const last = history.pop();
  if(last.type==='assign') {
    assignments[last.mid] = (assignments[last.mid]||[]).filter(x=>x!==last.gid);
    if(last.fromMid && !assignments[last.fromMid].includes(last.gid)) assignments[last.fromMid].push(last.gid);
  } else if(last.type==='removeFromMesa') {
    if(!assignments[last.mid]) assignments[last.mid]=[];
    assignments[last.mid].push(last.gid);
  } else if(last.type==='removeMesa') {
    mesas = last.saved.mesas;
    assignments = last.saved.assignments;
  } else if(last.type==='addMesa') {
    mesas = mesas.filter(m=>m.id!==last.id);
    delete assignments[last.id];
  } else if(last.type==='addGuest') {
    guests = guests.filter(g=>g.id!==last.id);
  } else if(last.type==='editGuest') {
    const g = guests.find(g=>g.id===last.gid);
    if(g) { g.name=last.saved.name; g.cat=last.saved.cat; }
  } else if(last.type==='removeGuest') {
    guests.push(last.saved.guest);
    assignments = last.saved.assignments;
  }
  hideToast();
  renderAll();
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, withUndo) {
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  const ub = t.querySelector('.toast-undo');
  document.getElementById('toast-msg').textContent = msg;
  ub.style.display = withUndo ? 'inline' : 'none';
  t.classList.add('show');
  toastTimer = setTimeout(hideToast, 3000);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(title, subtitle, bodyHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-subtitle').textContent = subtitle||'';
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }

// ─── SAVE / LOAD ──────────────────────────────────────────────────────────────
function saveState() {
  try {
    localStorage.setItem('plano_v2', JSON.stringify({mesas, assignments, guests, mesaCounter, guestCounter}));
    const btn = document.getElementById('btn-gravar');
    btn.classList.add('saved');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Gravado!';
    setTimeout(()=>{ btn.classList.remove('saved'); btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Gravar'; }, 2000);
  } catch(e) { alert('Erro ao gravar: '+e.message); }
}

function loadState() {
  try {
    const raw = localStorage.getItem('plano_v2');
    if(!raw) return;
    const s = JSON.parse(raw);
    if(s.mesas) mesas = s.mesas;
    if(s.assignments) assignments = s.assignments;
    if(s.guests) guests = s.guests;
    if(s.mesaCounter) mesaCounter = s.mesaCounter;
    if(s.guestCounter) guestCounter = s.guestCounter;
  } catch(e) { console.warn('Erro ao carregar:', e); }
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function buildText() {
  let txt = '🪑 PLANO DE MESAS\n\n';
  mesas.forEach(m=>{
    const gs = getMesaGuests(m.id);
    txt += `*${m.nome}* (${gs.length} pessoas)\n`;
    gs.forEach(g=>txt+=`• ${g.name}\n`);
    txt+='\n';
  });
  const free = guests.filter(g=>!getAssigned().has(g.id));
  if(free.length) { txt+=`⚠ Por sentar (${free.length}):\n`; free.forEach(g=>txt+=`• ${g.name}\n`); }
  return txt;
}
function shareWhatsApp() { window.open('https://wa.me/?text='+encodeURIComponent(buildText()),'_blank'); }
function exportTxt() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([buildText()],{type:'text/plain;charset=utf-8'}));
  a.download = 'plano_mesas.txt'; a.click();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadState();
renderAll();
</script>
