<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Plano de Mesas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e2d9;
  --text: #1a1714;
  --text-muted: #8c7f72;
  --accent: #b5845a;
  --accent-light: #f5ede4;
  --green: #4a7c59;
  --green-light: #e8f0eb;
  --amber: #a0692a;
  --amber-light: #f5eddf;
  --blue: #2d5986;
  --blue-light: #e5edf5;
  --danger: #c0392b;
  --danger-light: #fbeaea;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--text);
}
.header-title span { color: var(--accent); }

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.stat {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 8px 6px;
  text-align: center;
}
.stat-n { font-size: 18px; font-weight: 500; color: var(--text); line-height: 1; }
.stat-l { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.stat.warn .stat-n { color: var(--danger); }

/* TABS */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 113px;
  z-index: 99;
}
.tab {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* MAIN CONTENT */
.content { padding: 16px; padding-bottom: 100px; }

/* PENDING BANNER */
.banner {
  background: var(--amber-light);
  border: 1px solid #e8d4b0;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--amber);
  display: none;
}
.banner.show { display: block; }

/* MESA CARD */
.mesa-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.mesa-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.mesa-num {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  font-size: 13px;
  font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.mesa-name {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  border: none;
  background: transparent;
  color: var(--text);
  outline: none;
  min-width: 0;
}
.mesa-count {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  flex-shrink: 0;
}
.mesa-count.over { color: var(--danger); font-weight: 500; }
.mesa-del {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.mesa-del:active { background: var(--danger-light); color: var(--danger); }

.mesa-body { padding: 10px 12px; }
.guest-chips { display: flex; flex-wrap: wrap; gap: 6px; min-height: 36px; }
.empty-mesa { font-size: 12px; color: var(--text-muted); font-style: italic; padding: 6px 0; }

/* GUEST CHIPS */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 400;
  cursor: pointer;
  user-select: none;
  transition: transform 0.1s;
  border: none;
  outline: none;
}
.chip:active { transform: scale(0.95); }
.chip-a { background: var(--blue-light); color: var(--blue); }
.chip-c { background: var(--green-light); color: var(--green); }
.chip-b { background: var(--amber-light); color: var(--amber); }
.chip-x {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: rgba(0,0,0,0.1);
  font-size: 10px;
  flex-shrink: 0;
}

/* UNASSIGNED LIST */
.unassigned-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.unassigned-item:active { transform: scale(0.98); }
.unassigned-item.ui-a { background: var(--blue-light); color: var(--blue); border-color: #c5d8ee; }
.unassigned-item.ui-c { background: var(--green-light); color: var(--green); border-color: #c0d9c9; }
.unassigned-item.ui-b { background: var(--amber-light); color: var(--amber); border-color: #e8d4b0; }
.ui-right { display: flex; align-items: center; gap: 8px; }
.cat-tag { font-size: 10px; opacity: 0.65; }
.assign-btn {
  background: white;
  border: 1px solid currentColor;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 500;
  color: inherit;
  cursor: pointer;
}

/* ADD MESA SECTION */
.add-mesa-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.add-mesa-form h3 { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 10px; }
.form-row { display: flex; gap: 8px; }
.form-row input { flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; }
.form-row input:focus { border-color: var(--accent); }
.form-row input[type=number] { width: 70px; flex: none; text-align: center; }
.btn-add {
  padding: 10px 16px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
.btn-add:active { opacity: 0.85; }

/* LEGEND */
.legend {
  display: flex;
  gap: 14px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; }

/* BOTTOM BAR */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
}
.btn-wa {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 13px;
  background: #25D366;
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  text-decoration: none;
}
.btn-wa:active { opacity: 0.85; }
.btn-txt {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 13px 16px;
  background: var(--bg);
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
}
.btn-txt:active { background: var(--border); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 500; }
.modal-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.modal-close {
  width: 32px; height: 32px;
  border: none; background: var(--bg); border-radius: 50%;
  font-size: 18px; cursor: pointer; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
}
.modal-list { overflow-y: auto; padding: 12px 14px; flex: 1; }
.modal-mesa-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  margin-bottom: 6px;
  text-align: left;
  transition: all 0.15s;
}
.modal-mesa-btn:active { background: var(--accent-light); border-color: var(--accent); }
.modal-mesa-btn.full { opacity: 0.5; }
.mesa-btn-right { font-size: 11px; color: var(--text-muted); }
.mesa-btn-right.over { color: var(--danger); }

/* Unassigned tab empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }
</style>
</head>

let mesas = [
  {id:'m1',nome:'Mesa 1 — Crianças',lugares:14},
  {id:'m2',nome:'Mesa 2',lugares:10},
  {id:'m4',nome:'Mesa 4',lugares:10},
  {id:'m5',nome:'Mesa 5',lugares:10},
  {id:'m6',nome:'Mesa 6',lugares:10},
  {id:'m7',nome:'Mesa 7',lugares:8},
  {id:'m8',nome:'Mesa 8',lugares:10},
  {id:'m9',nome:'Mesa 9',lugares:10},
];

let assignments = {};
let mesaCounter = 9;
let pendingGuestId = null;

mesas.forEach(m => {
  const num = parseInt(m.id.replace('m',''));
  assignments[m.id] = guests.filter(g => g.mesa === num).map(g => g.id);
});

function getAssigned() {
  const s = new Set();
  Object.values(assignments).forEach(arr => arr.forEach(id => s.add(id)));
  return s;
}

function catClass(cat) {
  return cat === 'c' ? 'c' : cat === 'b' ? 'b' : 'a';
}
function catLabel(cat) {
  return cat === 'c' ? 'Criança' : cat === 'b' ? 'Bebé' : 'Adulto';
}
function chipClass(cat) { return 'chip chip-' + cat; }
function uiClass(cat) { return 'unassigned-item ui-' + cat; }

function updateStats() {
  const assigned = getAssigned().size;
  const total = guests.length;
  document.getElementById('s-sentados').textContent = assigned;
  document.getElementById('s-mesas').textContent = mesas.length;
  const free = total - assigned;
  document.getElementById('s-livres').textContent = free;
  const banner = document.getElementById('banner');
  if(free > 0) {
    const names = guests.filter(g => !getAssigned().has(g.id)).map(g => g.name).join(', ');
    banner.textContent = `⚠ ${free} sem mesa: ${names}`;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

function renderMesas() {
  const el = document.getElementById('mesas-list');
  el.innerHTML = mesas.map((m, i) => {
    const gsts = (assignments[m.id]||[]).map(id => guests.find(g => g.id === id)).filter(Boolean);
    const count = gsts.length;
    const over = count > m.lugares;
    const chips = gsts.length
      ? gsts.map(g => `<button class="${chipClass(g.cat)}" onclick="removeFromMesa(${g.id},'${m.id}')" title="Toca para remover">
          ${g.name}<span class="chip-x">×</span>
        </button>`).join('')
      : '<span class="empty-mesa">Sem convidados</span>';
    return `<div class="mesa-card">
      <div class="mesa-head">
        <div class="mesa-num">${i+1}</div>
        <input class="mesa-name" value="${m.nome}" onchange="renameMesa('${m.id}',this.value)">
        <span class="mesa-count ${over?'over':''}">${count}/${m.lugares}</span>
        <button class="mesa-del" onclick="removeMesa('${m.id}')">×</button>
      </div>
      <div class="mesa-body"><div class="guest-chips">${chips}</div></div>
    </div>`;
  }).join('');
}

function renderUnassigned() {
  const assigned = getAssigned();
  const list = guests.filter(g => !assigned.has(g.id));
  const el = document.getElementById('unassigned-list');
  if(!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="emoji">🎉</div><p>Todos os convidados estão sentados!</p></div>';
    return;
  }
  el.innerHTML = list.map(g => `
    <div class="${uiClass(g.cat)}">
      <span>${g.name}</span>
      <div class="ui-right">
        <span class="cat-tag">${catLabel(g.cat)}</span>
        <button class="assign-btn" onclick="openModal(${g.id})">Sentar →</button>
      </div>
    </div>
  `).join('');
}

function removeFromMesa(guestId, mesaId) {
  assignments[mesaId] = assignments[mesaId].filter(x => x !== guestId);
  renderMesas();
  renderUnassigned();
  updateStats();
}

function removeMesa(id) {
  if(!confirm('Remover esta mesa? Os convidados voltam à lista.')) return;
  mesas = mesas.filter(m => m.id !== id);
  delete assignments[id];
  renderMesas();
  renderUnassigned();
  updateStats();
}

function renameMesa(id, name) {
  const m = mesas.find(m => m.id === id);
  if(m) m.nome = name;
}

function addMesa() {
  mesaCounter++;
  const nome = document.getElementById('nova-nome').value.trim() || `Mesa ${mesaCounter}`;
  const lugares = parseInt(document.getElementById('nova-lugares').value) || 10;
  const id = 'm' + mesaCounter;
  mesas.push({id, nome, lugares});
  assignments[id] = [];
  document.getElementById('nova-nome').value = '';
  renderMesas();
  updateStats();
  switchTab('mesas', document.querySelector('.tab'));
}

function openModal(guestId) {
  pendingGuestId = guestId;
  const g = guests.find(g => g.id === guestId);
  document.getElementById('modal-title').textContent = g.name;
  document.getElementById('modal-subtitle').textContent = 'Escolhe a mesa';
  const list = document.getElementById('modal-list');
  list.innerHTML = mesas.map(m => {
    const count = (assignments[m.id]||[]).length;
    const over = count >= m.lugares;
    return `<button class="modal-mesa-btn ${over?'full':''}" onclick="assignToMesa('${m.id}')">
      <span>${m.nome}</span>
      <span class="mesa-btn-right ${over?'over':''}">${count}/${m.lugares}${over?' · cheio':''}</span>
    </button>`;
  }).join('');
  document.getElementById('modal-overlay').classList.add('open');
}

function assignToMesa(mesaId) {
  if(pendingGuestId === null) return;
  if(!assignments[mesaId]) assignments[mesaId] = [];
  if(!assignments[mesaId].includes(pendingGuestId)) {
    assignments[mesaId].push(pendingGuestId);
  }
  closeModalDirect();
  renderMesas();
  renderUnassigned();
  updateStats();
}

function closeModal(e) {
  if(e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  pendingGuestId = null;
}

function switchTab(name, btn) {
  ['mesas','por-sentar','nova-mesa'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['mesas','por-sentar','nova-mesa'][i] === name);
  });
}

function buildText() {
  let txt = "🪑 PLANO DE MESAS\n\n";
  const assigned = getAssigned();
  mesas.forEach(m => {
    const gsts = (assignments[m.id]||[]).map(id => guests.find(g => g.id === id)).filter(Boolean);
    txt += `*${m.nome}* (${gsts.length}/${m.lugares})\n`;
    gsts.forEach(g => txt += `• ${g.name}\n`);
    txt += '\n';
  });
  const unassigned = guests.filter(g => !assigned.has(g.id));
  if(unassigned.length) {
    txt += `⚠ Por sentar (${unassigned.length}):\n`;
    unassigned.forEach(g => txt += `• ${g.name}\n`);
  }
  return txt;
}

function shareWhatsApp() {
  const txt = buildText();
  const url = 'https://wa.me/?text=' + encodeURIComponent(txt);
  window.open(url, '_blank');
}

function exportTxt() {
  const txt = buildText();
  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'plano_mesas.txt';
  a.click();
}

renderMesas();
renderUnassigned();
updateStats();
</script>
</body>
</html>
